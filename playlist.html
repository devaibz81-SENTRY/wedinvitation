<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew & Rosanna - Wedding Playlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(180deg, #faf5f0 0%, #f0e6d3 100%);
      color: #2b2520;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: #cba97c;
      margin-bottom: 0.5rem;
    }
    .header p {
      color: #888;
      font-size: 0.9rem;
    }
    .song-list {
      list-style: none;
    }
    .song-item {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 4px solid #cba97c;
    }
    .song-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: #2b2520;
      margin-bottom: 0.25rem;
    }
    .song-guest {
      font-size: 0.8rem;
      color: #888;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #888;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
    }
  
    
    /* --- COLOR & TRIM OVERRIDES V2 --- */
    .hero-flourish, .hero-divider, 
    .story-signature, .story-img-accent {
        display: none !important;
    }
    
    /* Restore Ampersand */
    .hero-ampersand {
        display: inline-block !important;
        color: #000000 !important;
    }
    
    /* Soft shadows on headings */
    h1, h2, h3, .section-title, .hero-names, .gift-title {
        text-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
    }
    
    /* Black Nav Header & Buttons */
    nav {
        background: #000000 !important;
        border-bottom: none !important;
    }
    nav a {
        background: #000000 !important;
        color: #ffffff !important;
        border: 1px solid rgba(255,255,255,0.3) !important;
    }
    nav a:hover {
        background: rgba(255,255,255,0.15) !important;
        border-color: #ffffff !important;
    }
    
    /* White Footer Text with Dark Background */
    footer {
        background: #000000 !important;
        color: #ffffff !important;
    }
    footer .footer-names, footer p {
        color: #ffffff !important;
    }
    /* Larger Date in Footer */
    footer p:nth-of-type(1) {
        font-size: clamp(2rem, 5vw, 3.2rem) !important;
        margin-top: 1rem;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wedding Playlist</h1>
      <p>Song requests from our guests</p>
    </div>
    <div id="content">
      <div class="loading">Loading playlist...</div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw33IBpUacNLGAcqc4EGp5L2dlxaMkWSbEFvSTdFTDq6p9iO5oZCIWl6aS-BB6EIW-JUA/exec';
    
    async function loadPlaylist() {
      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?sheet=Songs`);
        const data = await res.json();
        const songs = data.data || [];
        
        const content = document.getElementById('content');
        
        if (songs.length === 0) {
          content.innerHTML = '<div class="empty">No song requests yet. Check back soon!</div>';
          return;
        }
        
        content.innerHTML = '<ul class="song-list">' + songs.map(s => `
          <li class="song-item">
            <div class="song-name">${escapeHtml(s.content)}</div>
            <div class="song-guest">Requested by ${escapeHtml(s.name)}</div>
          </li>
        `).join('') + '</ul>';
        
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="empty">Unable to load playlist. Please try again later.</div>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
    
    loadPlaylist();
  </script>
</body>
</html>
