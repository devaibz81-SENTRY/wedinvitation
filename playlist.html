<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosanna & Andrew - Wedding Playlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(180deg, #faf5f0 0%, #f0e6d3 100%);
      color: #2b2520;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: #cba97c;
      margin-bottom: 0.5rem;
    }
    .header p {
      color: #888;
      font-size: 0.9rem;
    }
    .song-list {
      list-style: none;
    }
    .song-item {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 4px solid #cba97c;
    }
    .song-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: #2b2520;
      margin-bottom: 0.25rem;
    }
    .song-guest {
      font-size: 0.8rem;
      color: #888;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #888;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wedding Playlist</h1>
      <p>Song requests from our guests</p>
    </div>
    <div id="content">
      <div class="loading">Loading playlist...</div>
    </div>
  </div>

  <script>
    const CONVEX_HTTP_URL = 'https://quiet-lark-309.convex.site';
    
    async function loadPlaylist() {
      try {
        const res = await fetch(`${CONVEX_HTTP_URL}/api/playlist`);
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        const songs = data.songs || [];
        
        const content = document.getElementById('content');
        
        if (songs.length === 0) {
          content.innerHTML = '<div class="empty">No song requests yet. Check back soon!</div>';
          return;
        }
        
        content.innerHTML = '<ul class="song-list">' + songs.map(s => `
          <li class="song-item">
            <div class="song-name">${escapeHtml(s.song_request)}</div>
            <div class="song-guest">Requested by ${escapeHtml(s.display_name)}</div>
          </li>
        `).join('') + '</ul>';
        
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="empty">Unable to load playlist. Please try again later.</div>';
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    loadPlaylist();
  </script>
</body>
</html>
