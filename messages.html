<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - R&A Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #f5f0e8; }
    .container { max-width: 700px; margin: 0 auto; padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; color: #d4b896; margin-bottom: 0.5rem; }
    .progress { font-size: 0.75rem; letter-spacing: 0.15em; color: rgba(245, 240, 232, 0.5); }
    .message-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 184, 150, 0.2); border-radius: 16px; padding: 3rem 2.5rem; text-align: center; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
    .message-text { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; line-height: 1.6; color: #f5f0e8; margin-bottom: 1.5rem; }
    .message-author { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #d4b896; }
    .controls { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
    .btn { padding: 1rem 2rem; border: none; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; transition: all 0.3s; }
    .btn-prev { background: rgba(255, 255, 255, 0.1); color: #f5f0e8; border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-prev:hover { background: rgba(255, 255, 255, 0.2); }
    .btn-next { background: #d4b896; color: #1a1a2e; }
    .btn-next:hover { background: #c9a84c; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .loading { text-align: center; padding: 4rem 2rem; }
    .spinner { width: 50px; height: 50px; border: 4px solid rgba(212, 184, 150, 0.3); border-top: 4px solid #d4b896; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 4rem 2rem; }
    .dots { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(212, 184, 150, 0.3); transition: all 0.3s; }
    .dot.active { background: #d4b896; transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>Messages for Rosanna & Andrew</h1><p class="progress" id="progress">1 of 5</p></header>
    <div class="loading" id="loading"><div class="spinner"></div><p>Loading messages...</p></div>
    <div class="message-card" id="card" style="display:none;"><p class="message-text" id="message">Loading messages...</p><p class="message-author" id="author"></p></div>
    <div class="dots" id="dots" style="display:none;"></div>
    <div class="controls" id="controls" style="display:none;">
      <button class="btn btn-prev" id="prevBtn" onclick="prevMessage()">&#8592; Previous</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextMessage()">Next &#8594;</button>
    </div>
    <div class="empty" id="empty" style="display:none;"><p>No messages yet!</p></div>
  </div>
  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyt5l2wFdAb0aoPNVeuA5-IG-wBUexiymxuISdyNiYYc_uwFwD3c9BE4qGKOIPP3BumVg/exec';
    var messages = [], currentIndex = 0;
    
    fetch(APPS_SCRIPT_URL + '?sheet=Messages')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        messages = data.data || [];
        render();
      });
    
    function render() {
      document.getElementById('loading').style.display = 'none';
      var card = document.getElementById('card');
      var empty = document.getElementById('empty');
      if (!messages.length) {
        empty.style.display = 'block';
        document.getElementById('progress').textContent = '0 messages';
        return;
      }
      card.style.display = 'flex';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('dots').style.display = 'flex';
      updateDisplay();
    }
    
    function updateDisplay() {
      var msg = messages[currentIndex];
      document.getElementById('message').textContent = '"' + msg.content + '"';
      document.getElementById('author').textContent = '— ' + msg.name;
      document.getElementById('progress').textContent = (currentIndex + 1) + ' of ' + messages.length;
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === messages.length - 1;
      document.getElementById('dots').innerHTML = messages.map(function(_, i) { return '<div class="dot' + (i === currentIndex ? ' active' : '') + '"></div>'; }).join('');
    }
    
    function prevMessage() { if (currentIndex > 0) { currentIndex--; updateDisplay(); } }
    function nextMessage() { if (currentIndex < messages.length - 1) { currentIndex++; updateDisplay(); } }
    document.addEventListener('keydown', function(e) { if (e.key === 'ArrowLeft') prevMessage(); if (e.key === 'ArrowRight') nextMessage(); });
  </script>
</body>
</html>
