<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Requests - A&R Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #faf8f5 0%, #f0ede8 100%); min-height: 100vh; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 3rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: #2f2418; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #8b7444; }
    .song-count { background: white; padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 2rem; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .song-count strong { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #c9a84c; }
    .song-list { display: flex; flex-direction: column; gap: 1rem; }
    .song-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #c9a84c; }
    .song-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: #2f2418; margin-bottom: 0.5rem; }
    .guest-name { font-size: 0.75rem; color: #8b7444; text-transform: uppercase; letter-spacing: 0.1em; }
    .empty, .loading { text-align: center; padding: 4rem 2rem; color: #8b8276; }
    .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
    .loader { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 5px; }
    .loading-text { color: #8b7444; font-size: 14pt; font-weight: 600; margin-left: 10px; }
    .dot { margin-left: 3px; animation: blink 1.5s infinite; }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }
    .loading-bar-background { --height: 30px; display: flex; align-items: center; box-sizing: border-box; padding: 5px; width: 200px; height: var(--height); background-color: #e8e2d8; box-shadow: #ccc -2px 2px 4px 0px inset; border-radius: calc(var(--height) / 2); }
    .loading-bar { position: relative; display: flex; justify-content: center; flex-direction: column; --height: 20px; width: 0%; height: var(--height); overflow: hidden; background: linear-gradient(0deg, #c9a84c 0%, #e8c87a 100%); border-radius: calc(var(--height) / 2); animation: loading 2s ease-out infinite; }
    .white-bars-container { position: absolute; display: flex; align-items: center; gap: 18px; }
    .white-bar { background: linear-gradient(-45deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 70%); width: 10px; height: 45px; opacity: 0.3; rotate: 45deg; }
    @keyframes loading { 0% { width: 0; } 80% { width: 100%; } 100% { width: 100%; } }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  
    
    /* --- COLOR & TRIM OVERRIDES V2 --- */
    .hero-flourish, .hero-divider, 
    .story-signature, .story-img-accent {
        display: none !important;
    }
    
    /* Restore Ampersand */
    .hero-ampersand {
        display: inline-block !important;
        color: #000000 !important;
    }
    
    /* Soft shadows on headings */
    h1, h2, h3, .section-title, .hero-names, .gift-title {
        text-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
    }
    
    /* Black Nav Header & Buttons */
    nav {
        background: #000000 !important;
        border-bottom: none !important;
    }
    nav a {
        background: #000000 !important;
        color: #ffffff !important;
        border: 1px solid rgba(255,255,255,0.3) !important;
    }
    nav a:hover {
        background: rgba(255,255,255,0.15) !important;
        border-color: #ffffff !important;
    }
    
    /* White Footer Text with Dark Background */
    footer {
        background: #000000 !important;
        color: #ffffff !important;
    }
    footer .footer-names, footer p {
        color: #ffffff !important;
    }
    /* Larger Date in Footer */
    footer p:nth-of-type(1) {
        font-size: clamp(2rem, 5vw, 3.2rem) !important;
        margin-top: 1rem;
    }

  </style>
</head>
<body>
  <div class="container">
    <header><h1>Song Requests</h1><p class="subtitle">Andrew & Rosanna's Wedding</p></header>
    <div class="song-count"><strong id="count">0</strong> songs requested</div>
    <div class="loading" id="loading">
      <div class="loader">
        <div class="loading-bar-background">
          <div class="loading-bar">
            <div class="white-bars-container">
              <div class="white-bar"></div>
              <div class="white-bar"></div>
              <div class="white-bar"></div>
            </div>
          </div>
        </div>
        <div class="loading-text">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
      </div>
    </div>
    <div class="song-list" id="songs" style="display:none;"></div>
    <div class="empty" id="empty" style="display:none;"><div class="empty-icon">&#127925;</div><p>No song requests yet!</p></div>
  </div>
  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw33IBpUacNLGAcqc4EGp5L2dlxaMkWSbEFvSTdFTDq6p9iO5oZCIWl6aS-BB6EIW-JUA/exec';
    
    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    fetch(APPS_SCRIPT_URL + '?sheet=Songs')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var songs = data.data || [];
        document.getElementById('loading').style.display = 'none';
        document.getElementById('count').textContent = songs.length;
        if (!songs.length) {
          document.getElementById('empty').style.display = 'block';
          return;
        }
        document.getElementById('songs').style.display = 'flex';
        document.getElementById('songs').innerHTML = songs.map(function(s) {
          return '<div class="song-card"><div class="song-name">' + escapeHtml(s.content) + '</div><div class="guest-name">Requested by ' + escapeHtml(s.name) + '</div></div>';
        }).join('');
      });
  </script>
</body>
</html>
