<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew & Rosanna - July 4th, 2026 - San Ignacio, Belize</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <link rel="preload" as="image" href="photos/main-card-photo.gif" fetchpriority="high" />

  <style>
    :root {
      --black: #000000;
      /* Black */
      --ivory: #ffffff;
      /* Ivory */
      --champagne: #ffffff;
      /* Champagne */
      --green: #ffffff;
      /* Champagne */
      --gold: #000000;
      /* Gold */
      --cream: #ffffff;
      /* Background Tint */
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
      max-width: 100vw;
    }

    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      line-height: 1.55;
      overflow-x: hidden;
      max-width: 100vw;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── GIF INTRO OVERLAY ─────────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 9999;
      background: linear-gradient(135deg, var(--cream) 0%, var(--champagne) 50%, var(--cream) 100%);
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .intro-gif-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: manipulation;
    }
    
    .intro-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: introBgPulse 4s ease-in-out infinite;
    }
    
    @keyframes introBgPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    
    .loading-text {
      color: var(--champagne);
      font-size: 14pt;
      font-weight: 600;
    }
    
    .loading-invite-text {
      position: absolute;
      bottom: 15vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--gold);
      text-align: center;
      opacity: 0.9;
      text-shadow: 0 2px 20px rgba(212, 175, 55, 0.3);
    }
    
    .dot {
      animation: blink 1.5s infinite;
    }
    
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }
    
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    
    .loading-bar-background {
      --height: 30px;
      display: flex;
      align-items: center;
      padding: 5px;
      width: 200px;
      height: var(--height);
      background-color: #e8e2d8;
      box-shadow: #ccc -2px 2px 4px 0px inset;
      border-radius: calc(var(--height) / 2);
    }
    
    .loading-bar {
      position: relative;
      display: flex;
      justify-content: center;
      flex-direction: column;
      --height: 20px;
      width: 0%;
      height: var(--height);
      overflow: hidden;
      background: linear-gradient(0deg, #c9a84c 0%, #e8c87a 100%);
      border-radius: calc(var(--height) / 2);
      animation: loading 2s ease-out infinite;
    }
    
    .white-bars-container {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    
    .white-bar {
      background: linear-gradient(-45deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 70%);
      width: 10px;
      height: 45px;
      opacity: 0.3;
      rotate: 45deg;
    }
    
    @keyframes loading {
      0% { width: 0; }
      80% { width: 100%; }
      100% { width: 100%; }
    }
    
    #intro-canvas {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      animation: gifScale 0.6s ease-out forwards;
    }
    
    .tap-hint {
      position: absolute;
      bottom: calc(50% + 60px);
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: tapPulse 2s ease-in-out infinite;
      text-align: center;
      pointer-events: none;
    }
    
    .tap-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      text-align: center;
    }
    
    @keyframes tapPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    @keyframes tapBounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }
    
    .intro-gif {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .intro-gif.visible {
      opacity: 1;
    }
    
    @keyframes gifScale {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .intro-gif-container.exit {
      animation: fadeOutBg 1s ease-out forwards;
    }
    
    @keyframes fadeOutBg {
      to { opacity: 0; pointer-events: none; }
    }
    
    .main-content {
      opacity: 0;
      transition: opacity 1s ease-in;
    }
    
    .main-content.visible {
      opacity: 1;
    }

    /* ─── NAV ─────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 60px;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.65rem;
      padding: 0 1rem;
      background: rgba(250, 247, 242, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      overflow: hidden;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      height: 40px;
      padding: 0 1.2rem;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      color: var(--black);
      text-decoration: none;
      opacity: 0.92;
      transition: opacity 0.3s, color 0.3s, border-color 0.3s, background 0.3s;
      font-weight: 500;
    }

    nav a:hover {
      opacity: 1;
      color: var(--black);
      border-color: var(--black);
      background: rgba(141, 163, 139, 0.1);
    }

    /* ─── HERO ────────────────────────────────────── */
    #hero {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated background petals */
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(212, 175, 55, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 10%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
      animation: auraShift 12s ease-in-out infinite alternate;
    }

    @keyframes auraShift {
      0% {
        transform: scale(1) rotate(0deg);
      }

      100% {
        transform: scale(1.08) rotate(2deg);
      }
    }

    /* Floating decorative elements */
    .petal {
      position: absolute;
      pointer-events: none;
      width: 8px;
      height: 12px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      will-change: transform, opacity;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(100vh) rotate(360deg) translateX(60px);
        opacity: 0;
      }
    }

    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      font-weight: 500;
      opacity: 0;
      animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
    }

    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--gold);
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: heroNamesReveal 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s forwards;
      transform-origin: center top;
      text-shadow: 0 4px 30px rgba(212, 175, 55, 0.4);
    }

    @keyframes heroFadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heroNamesReveal {
      0% { 
        opacity: 0; 
        transform: translateY(80px) scale(0.9); 
        filter: blur(8px);
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
        filter: blur(0);
      }
    }

    .hero-ampersand {
      display: block;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--gold);
      margin: 0.8rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      opacity: 0;
      animation: ampersandReveal 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.1s forwards;
    }
    
    @keyframes ampersandReveal {
      0% { 
        opacity: 0; 
        transform: translateY(50px) scale(0.8); 
        letter-spacing: 0.5em;
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
        letter-spacing: normal;
      }
    }

    .hero-date {
      margin-top: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.6vw, 1.5rem);
      font-weight: 500;
      font-style: italic;
      color: #2d4c32;
      letter-spacing: 0.09em;
      opacity: 0;
      animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards;
    }

    .hero-location {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0;
      font-weight: 500;
      margin-top: 0.6rem;
      animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.8s forwards;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem auto;
      width: fit-content;
      opacity: 0;
      animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 2.1s forwards;
    }

    .hero-divider span {
      display: block;
      height: 1px;
      width: 80px;
      background: var(--black);
      opacity: 0.6;
    }

    .hero-divider i {
      color: var(--black);
      font-size: 0.5rem;
    }

    .hero-flourish {
      width: min(360px, 82vw);
      height: 34px;
      display: block;
      margin: 0.25rem auto 0.9rem;
      opacity: 0;
      animation: flourishReveal 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.5s forwards;
    }
    
    @keyframes flourishReveal {
      0% { opacity: 0; transform: scaleX(0); }
      100% { opacity: 1; transform: scaleX(1); }
    }

    .hero-flourish path {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: flourishDraw 2s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards, flourishGlow 3.4s ease-in-out 3.5s infinite;
    }

    @keyframes flourishDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes flourishGlow {

      0%,
      100% {
        opacity: 0.65;
      }

      50% {
        opacity: 1;
      }
    }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: heroFadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 2.8s forwards;
    }

    .scroll-hint span {
      font-size: 0.64rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      font-weight: 500;
    }

    /* ─── SECTION SHARED ──────────────────────────── */
    section {
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }

    .section-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 5vw, 4rem);
      text-align: center;
      margin-bottom: 3rem;
      color: var(--gold);
      text-shadow: 0 2px 20px rgba(212, 175, 55, 0.3);
    }

    /* ─── PHOTO GALLERY ───────────────────────────── */
    #gallery {
      background: var(--black);
      max-width: 100%;
      padding: 5rem 2rem;
    }

    #gallery .section-eyebrow {
      color: var(--champagne);
    }

    #gallery .section-title {
      color: var(--ivory);
    }

    .gallery-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: clamp(180px, 22vw, 260px);
      gap: 1rem;
    }

    .photo-frame {
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(212, 175, 55, 0.24);
      border-radius: 12px;
      cursor: pointer;
    }

    /* Decorative border overlay on each photo */
    .photo-frame::after {
      content: '';
      position: absolute;
      inset: clamp(6px, 1vw, 10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 8px;
      pointer-events: none;
      transition: border-color 0.4s;
    }

    .photo-frame:hover::after {
      border-color: rgba(212, 175, 55, 0.8);
    }

    .photo-frame.large {
      grid-column: 1 / 2;
      grid-row: span 2;
    }

    .photo-frame.tall {
      grid-column: 3 / 4;
      grid-row: span 2;
    }

    .photo-inner {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* PHOTO PLACEHOLDER - swap src with real PNG */
    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1c1c1c 0%, #2a2a2a 100%);
      transition: transform 0.7s ease;
    }

    .photo-frame:hover .photo-placeholder {
      transform: scale(1.04);
    }

    .photo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      object-position: center center;
      opacity: 0;
      transform: translateY(18px) scale(1.03);
      filter: saturate(0.9);
      transition: opacity 0.75s ease, transform 0.75s ease, filter 0.75s ease;
    }

    .photo-placeholder img.gallery-main-photo {
      object-position: center 30%;
    }

    .photo-placeholder img.is-loaded,
    .story-placeholder img.is-loaded {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: saturate(1);
    }

    .photo-frame:hover .photo-placeholder img.is-loaded {
      transform: translateY(0) scale(1.04);
    }

    /* Placeholder before real images added */
    .photo-placeholder-text {
      color: rgba(212, 175, 55, 0.78);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      padding: 1rem;
      font-weight: 500;
    }

    .photo-placeholder-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(212, 175, 55, 0.92);
    }

    /* Caption slide-up */
    .photo-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1rem 1rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      color: var(--ivory);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    .photo-frame:hover .photo-caption {
      transform: translateY(0);
    }

    /* ─── OUR STORY ───────────────────────────────── */
    #story {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .story-text .section-eyebrow {
      text-align: left;
    }

    .story-text .section-title {
      text-align: left;
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin-bottom: 2rem;
    }

    .story-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 2;
      color: #1a1a1a;
    }

    .story-body p+p {
      margin-top: 1.2rem;
    }

    .story-signature {
      margin-top: 2.5rem;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--gold);
    }

    .story-visual {
      position: relative;
    }

    .story-img-wrap {
      position: relative;
      padding-bottom: 130%;
      background: var(--champagne);
      overflow: hidden;
    }

    .story-img-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border: 1px solid var(--gold);
      z-index: 2;
      pointer-events: none;
    }

    .story-img-accent {
      position: absolute;
      bottom: -1.5rem;
      right: -1.5rem;
      width: 70%;
      padding-bottom: 70%;
      border: 1px solid var(--champagne);
      z-index: -1;
    }

    .story-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0e3d1 0%, #d9c3a0 100%);
    }

    .story-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      object-position: center center;
      opacity: 0;
      transform: translateY(18px) scale(1);
      filter: saturate(0.9);
      transition: opacity 0.75s ease, transform 0.75s ease, filter 0.75s ease;
      padding: 1rem;
      background: radial-gradient(circle at center, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 72%);
    }

    /* ─── MAIN PHOTO SECTION ───────────────────────────── */
    .main-photo-section {
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }
    
    .photo-rounded-holder {
      width: min(90vw, 400px);
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border: 3px solid var(--gold);
    }
    
    .photo-rounded-holder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .story-lead-in {
      margin-top: 2rem;
      margin-bottom: 4rem;
    }

    .story-lead-card {
      position: relative;
      max-width: 780px;
      margin: 0 auto;
      padding: 1.25rem;
      border: 1px solid rgba(191, 155, 48, 0.45);
      background: linear-gradient(135deg, rgba(255, 248, 238, 0.95) 0%, rgba(239, 226, 205, 0.96) 100%);
      box-shadow: 0 22px 44px rgba(62, 44, 21, 0.14);
    }

    .story-lead-card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(191, 155, 48, 0.35);
      pointer-events: none;
    }

    .story-lead-card img {
      display: block;
      width: 100%;
      max-height: min(72vh, 680px);
      object-fit: contain;
      object-position: center center;
    }

    .story-placeholder-text {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.64);
      text-align: center;
      padding: 1rem;
      font-weight: 500;
    }

    /* ─── DETAILS ─────────────────────────────────── */
    #details {
      background: var(--black);
      max-width: 100%;
      padding: 6rem 2rem;
    }

    .details-inner {

  <script>
    // ─── GIF INTRO SCRIPTS ─────────────────────────────────
    var gifContainer = document.getElementById('intro-gif-container');
    var overlay = document.getElementById('intro-overlay');
    var introGif = document.getElementById('intro-gif');
    var introCanvas = document.getElementById('intro-canvas');
    var introLoading = document.getElementById('intro-loading');
    var mainContent = document.getElementById('main-content');
    var music = document.getElementById('bg-music');
    var introStarted = false;
    var gifLoaded = false;
    
    // Load GIF and draw first frame to canvas
    var gifImg = new Image();
    gifImg.src = 'photos/intro.gif';
    gifImg.onload = function() {
      gifLoaded = true;
      // Hide loading, show static first frame
      introLoading.style.display = 'none';
      introCanvas.style.display = 'block';
      introCanvas.width = gifImg.width;
      introCanvas.height = gifImg.height;
      var ctx = introCanvas.getContext('2d');
      ctx.drawImage(gifImg, 0, 0);
      // Add tap hint now that GIF is ready
      var tapHint = document.getElementById('tap-hint');
      if (tapHint) {
        tapHint.style.display = 'block';
      }
    };
    
    // Click anywhere on overlay to start intro - ONLY works after GIF is loaded
    if (overlay) {
      overlay.onclick = function(e) {
        // Block click until GIF is fully loaded
        if (!gifLoaded) return;
        if (introStarted) return;
        introStarted = true;
        
        // Hide tap hint
        var tapHint = document.getElementById('tap-hint');
        if (tapHint) {
          tapHint.style.display = 'none';
        }
        
        // Show GIF and hide canvas
        introGif.style.display = 'block';
        introGif.classList.add('visible');
        introCanvas.style.display = 'none';
        
        // Play music
        music.play().catch(function(e) { console.log('Music play error:', e); });
        
        // Auto transition after 5.3 seconds
        setTimeout(function() {
          // Fade out overlay
          gifContainer.classList.add('exit');
          
          // Fade in main content
          setTimeout(function() {
            mainContent.classList.add('visible');
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
          }, 500);
        }, 5300);
      };
    }

    // Force scroll to top on reload
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    window.scrollTo(0, 0);

    // Carry guest params from invitation URL into RSVP links.
    // Mark as opened=1 so direct /rsvp legacy links can be redirected to intro first.
    const guestParams = new URLSearchParams(window.location.search || '');
    if (guestParams.toString()) {
      guestParams.set('opened', '1');
      const rsvpQuery = `?${guestParams.toString()}`;
      document.querySelectorAll('a[href="rsvp.html"]').forEach((link) => {
        link.href = `rsvp.html${rsvpQuery}`;

    // ── Countdown ────────────────────────────────────
    const wedding = new Date('2026-07-04T14:00:00');
    function updateCountdown() {
      const now = new Date();
      const diff = wedding - now;
      let absDiff = diff;
      if (diff <= 0) {
        absDiff = Math.abs(diff);
        // Find header holding '<span id="countdown-title">Days Until We Say I Do</span>'
        let headers = document.querySelectorAll('.section-eyebrow');
        headers.forEach(h => {
             if(h.innerText.includes('<span id="countdown-title">Days Until We Say I Do</span>')) {
                  h.innerText = "Days we've been married";

        let pTags = document.querySelectorAll('p');

                  p.innerText = "Days we've been married";
             }
        });
      }
      const d = Math.floor(absDiff / 86400000);
      const h = Math.floor((absDiff % 86400000) / 3600000);
      const m = Math.floor((absDiff % 3600000) / 60000);
      const s = Math.floor((absDiff % 60000) / 1000);

      const set = (id, val) => {
        const el = document.getElementById(id);
        const str = String(val).padStart(2, '0');
        if (el.textContent !== str) {
          el.classList.remove('flip');
          void el.offsetWidth;
          el.classList.add('flip');
          el.textContent = str;
        }
      };
      set('cd-days', d);
      set('cd-hours', h);
      set('cd-mins', m);
      set('cd-secs', s);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── Scroll Reveal ─────────────────────────────────
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 }); // Lower threshold for earlier activation on mobile 
    reveals.forEach(el => observer.observe(el));

    function primeMediaCache() {
      const mediaSources = [
        'photos/main-card-photo.gif',
        'photos/new_dress_code.jpeg'
      ];
      const warm = () => {
        mediaSources.forEach((src, index) => {
          const img = new Image();
          img.decoding = 'async';
          if ('fetchPriority' in img) img.fetchPriority = index === 0 ? 'high' : 'low';
          img.src = src;
        });
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(warm, { timeout: 1200 });
      } else {
        setTimeout(warm, 250);
      }
    }

    // Staggered media loading reveal for hosted photos.
    function setupMediaLoading() {
      const mediaItems = Array.from(document.querySelectorAll(
        '.photo-placeholder img, .story-placeholder img'
      ));
      mediaItems.forEach((img, index) => {
        img.style.transitionDelay = `${Math.min(index * 110, 660)}ms`;
        const markReady = () => img.classList.add('is-loaded');
        if (img.complete && img.naturalWidth > 0) {
          requestAnimationFrame(markReady);
          return;
        }
        img.addEventListener('load', markReady, { once: true });
        img.addEventListener('error', markReady, { once: true });
      });
    }
    primeMediaCache();
    setupMediaLoading();

    // Intro card reveal + music
    const introOverlay = document.getElementById('intro-overlay');
    const introCard = document.getElementById('intro-card');
    const bgMusic = document.getElementById('bg-music');
    const musicToggle = document.getElementById('music-toggle');
    
    
    function updateDigit(groupEl, value) {
        if (!groupEl) return;
        const currentNum = groupEl.getAttribute('data-val') || '0';
        if (currentNum === String(value)) return;
        
        groupEl.setAttribute('data-val', value);
        const nums = groupEl.querySelectorAll('.num');
        
        // Reset old flipping ones
        nums.forEach(n => {
            n.classList.remove('flipping');
            n.classList.remove('active');
            n.classList.remove('done');
        });
        
        // Set state for animation
        const prev = parseInt(currentNum);
        const activeNum = nums[prev];
        if (activeNum) {
            activeNum.classList.add('flipping');
        }
        
        const nextNum = nums[value];
        if (nextNum) {
            nextNum.classList.add('active');
        }
    }

    function updateFlipGroup(id, value, digits=2) {
        const groupWrap = document.getElementById(id);
        if (!groupWrap) return;
        
        const valStr = String(value).padStart(digits, '0');
        const groups = ['hundred', 'ten', 'one'];
        const startIdx = groups.length - digits;
        
        for (let i = 0; i < digits; i++) {
            const el = groupWrap.querySelector('.nums-' + groups[startIdx + i]);
            updateDigit(el, valStr[i]);
        }
    }
    
    // Gift Modal Logic
    function openGiftModal() {
      const modal = document.getElementById('gift-modal');
      const card = modal.querySelector('.secret-card');
      modal.style.display = 'flex';
      setTimeout(() => {
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 10);
      document.body.style.overflow = 'hidden';
    }

    function closeGiftModal() {
      const modal = document.getElementById('gift-modal');
      const card = modal.querySelector('.secret-card');
      card.style.opacity = '0';
      card.style.transform = 'translateY(30px)';
      setTimeout(() => {
        modal.style.display = 'none';
      }, 500);
      document.body.style.overflow = '';
    }

    async function copySpecificInput(text, hintId) {
      const hint = document.getElementById(hintId);
      const original = hint.innerText;
      
      const success = await attemptCopy(text);
      if (success) {
        hint.innerText = '(COPIED!)';
        hint.style.color = '#27ae60';
        setTimeout(() => {
          hint.innerText = original;
          hint.style.color = '#ccc';
        }, 2000);
      }
    }

    async function attemptCopy(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (err) {
        // Fallback for older browsers or non-secure contexts
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          const successful = document.execCommand('copy');
          document.body.removeChild(textArea);
          return successful;
        } catch (err2) {
          return false;
        }
      }
    }

    window.onclick = function (event) {
      if (event.target == document.getElementById('gift-modal')) {
        closeGiftModal();
      }
    }
  </script>

  </div><!-- end main-content -->

</body>
