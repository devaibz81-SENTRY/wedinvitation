<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew & Rosanna - July 4th, 2026 - San Ignacio, Belize</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <link rel="preload" as="image" href="photos/main-card-photo.gif" fetchpriority="high" />
  <link rel="preload" as="image" href="photos/cheers.gif" />
  <link rel="preload" as="image" href="photos/dinner.gif" />
  <link rel="preload" as="image" href="photos/story-photo.gif" />
  <style>
    :root {
      --black: #2b2520;
      /* Soft brown-black */
      --ivory: #ffffff;
      /* Nude/warm ivory */
      --champagne: #ffffff;
      /* Champagne/Sand */
      --blush: #d29e9a;
      /* Dusty Rose */
      --green: #ffffff;
      /* Sage Green */
      --gold: #000000;
      /* Muted Light Gold */
      --cream: #ffffff;
      /* Background Tint */
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
      width: 100%;
    }

    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      line-height: 1.55;
      overflow-x: hidden;
      width: 100%;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── GIF INTRO OVERLAY ─────────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .intro-gif-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .intro-gif {
      max-width: 95vw;
      max-height: 85vh;
      object-fit: contain;
      animation: gifScale 0.6s ease-out forwards;
    }
    
    @keyframes gifScale {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .invited-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 2vh;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      animation: fadeInUp 1s ease-out 0.5s both;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .enter-prompt {
      position: absolute;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    
    .enter-prompt.visible {
      opacity: 1;
      pointer-events: auto;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    .intro-gif-container.exit .intro-gif {
      animation: flyOff 1s ease-in forwards;
    }
    
    @keyframes flyOff {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120vh) scale(0.6); opacity: 0; }
    }
    
    .intro-gif-container.exit {
      animation: fadeOutBg 0.8s ease-out 0.5s forwards;
    }
    
    @keyframes fadeOutBg {
      to { opacity: 0; pointer-events: none; }
    }

    /* ─── NAV ─────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      padding: 1.4rem 1rem;
      background: rgba(250, 247, 242, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 auto;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      padding: 0.5rem 0.85rem;
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      color: var(--black);
      text-decoration: none;
      opacity: 0.92;
      transition: opacity 0.3s, color 0.3s, border-color 0.3s, background 0.3s;
      font-weight: 500;
    }

    nav a:hover {
      opacity: 1;
      color: var(--black);
      border-color: var(--black);
      background: rgba(141, 163, 139, 0.1);
    }

    /* ─── HERO ────────────────────────────────────── */
    #hero {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated background petals */
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(232, 196, 184, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(212, 184, 150, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 10%, rgba(58, 92, 63, 0.08) 0%, transparent 50%);
      animation: auraShift 12s ease-in-out infinite alternate;
    }

    @keyframes auraShift {
      0% {
        transform: scale(1) rotate(0deg);
      }

      100% {
        transform: scale(1.08) rotate(2deg);
      }
    }

    /* Floating decorative elements */
    .petal {
      position: absolute;
      pointer-events: none;
      width: 8px;
      height: 12px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      will-change: transform, opacity;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(100vh) rotate(360deg) translateX(60px);
        opacity: 0;
      }
    }

    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      font-weight: 500;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.2rem, 8vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--black);
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.7s forwards;
    }

    .hero-ampersand {
      display: block;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--gold);
      margin: 0.8rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      opacity: 0;
      animation: fadeUp 1.2s ease 1s forwards;
    }

    .hero-date {
      margin-top: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.6vw, 1.5rem);
      font-weight: 500;
      font-style: italic;
      color: #2d4c32;
      letter-spacing: 0.09em;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    .hero-location {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0;
      font-weight: 500;
      margin-top: 0.6rem;
      animation: fadeUp 1s ease 1.7s forwards;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem auto;
      width: fit-content;
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
    }

    .hero-divider span {
      display: block;
      height: 1px;
      width: 80px;
      background: var(--black);
      opacity: 0.6;
    }

    .hero-divider i {
      color: var(--black);
      font-size: 0.5rem;
    }

    .hero-flourish {
      width: min(360px, 82vw);
      height: 34px;
      display: block;
      margin: 0.25rem auto 0.9rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.35s forwards;
    }

    .hero-flourish path {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: flourishDraw 2.2s ease 1.6s forwards, flourishGlow 3.4s ease-in-out 3.8s infinite;
    }

    @keyframes flourishDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes flourishGlow {

      0%,
      100% {
        opacity: 0.65;
      }

      50% {
        opacity: 1;
      }
    }

    .hero-cta {
      display: inline-block;
      margin-top: 2rem;
      margin-bottom: 5rem;
      /* added bottom margin to avoid scroll overlap */
      padding: 0.9rem 3rem;
      background: var(--black);
      border: 1px solid var(--black);
      color: white;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 1s ease 2.2s forwards;
      transition: background 0.4s, transform 0.3s;
    }

    .hero-cta:hover {
      background: var(--black);
      transform: translateY(-2px);
    }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 3s forwards;
    }

    .scroll-hint span {
      font-size: 0.64rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      font-weight: 500;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {

      0%,
      100% {
        opacity: 1;
        transform: scaleY(1);
      }

      50% {
        opacity: 0.4;
        transform: scaleY(0.6);
      }
    }

    /* ─── SECTION SHARED ──────────────────────────── */
    section {
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }

    .section-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.2rem, 6vw, 5rem);
      text-align: center;
      margin-bottom: 3rem;
      color: var(--black);
    }

    /* ─── PHOTO GALLERY ───────────────────────────── */
    #gallery {
      background: var(--black);
      max-width: 100%;
      padding: 5rem 2rem;
    }

    #gallery .section-eyebrow {
      color: var(--champagne);
    }

    #gallery .section-title {
      color: var(--ivory);
    }

    .gallery-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: clamp(180px, 22vw, 260px);
      gap: 1rem;
    }

    .photo-frame {
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(201, 168, 76, 0.24);
      border-radius: 12px;
      cursor: pointer;
    }

    /* Decorative border overlay on each photo */
    .photo-frame::after {
      content: '';
      position: absolute;
      inset: clamp(6px, 1vw, 10px);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 8px;
      pointer-events: none;
      transition: border-color 0.4s;
    }

    .photo-frame:hover::after {
      border-color: rgba(201, 168, 76, 0.8);
    }

    .photo-frame.large {
      grid-column: 1 / 2;
      grid-row: span 2;
    }

    .photo-frame.tall {
      grid-column: 3 / 4;
      grid-row: span 2;
    }

    .photo-inner {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* PHOTO PLACEHOLDER - swap src with real PNG */
    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1c1c1c 0%, #2a2a2a 100%);
      transition: transform 0.7s ease;
    }

    .photo-frame:hover .photo-placeholder {
      transform: scale(1.04);
    }

    .photo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      object-position: center center;
      opacity: 0;
      transform: translateY(18px) scale(1.03);
      filter: saturate(0.9);
      transition: opacity 0.75s ease, transform 0.75s ease, filter 0.75s ease;
    }

    .photo-placeholder img.gallery-main-photo {
      object-position: center 30%;
    }

    .photo-placeholder img.is-loaded,
    .story-placeholder img.is-loaded {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: saturate(1);
    }

    .photo-frame:hover .photo-placeholder img.is-loaded {
      transform: translateY(0) scale(1.04);
    }

    /* Placeholder before real images added */
    .photo-placeholder-text {
      color: rgba(201, 168, 76, 0.78);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      padding: 1rem;
      font-weight: 500;
    }

    .photo-placeholder-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(201, 168, 76, 0.92);
    }

    /* Caption slide-up */
    .photo-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 1rem 1rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      color: var(--ivory);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    .photo-frame:hover .photo-caption {
      transform: translateY(0);
    }

    /* ─── OUR STORY ───────────────────────────────── */
    #story {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .story-text .section-eyebrow {
      text-align: left;
    }

    .story-text .section-title {
      text-align: left;
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin-bottom: 2rem;
    }

    .story-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 2;
      color: #3a3a3a;
    }

    .story-body p+p {
      margin-top: 1.2rem;
    }

    .story-signature {
      margin-top: 2.5rem;
      font-family: 'Great Vibes', cursive;
      font-size: 2.2rem;
      color: var(--gold);
    }

    .story-visual {
      position: relative;
    }

    .story-img-wrap {
      position: relative;
      padding-bottom: 130%;
      background: var(--champagne);
      overflow: hidden;
    }

    .story-img-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border: 1px solid var(--gold);
      z-index: 2;
      pointer-events: none;
    }

    .story-img-accent {
      position: absolute;
      bottom: -1.5rem;
      right: -1.5rem;
      width: 70%;
      padding-bottom: 70%;
      border: 1px solid var(--champagne);
      z-index: -1;
    }

    .story-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0e3d1 0%, #d9c3a0 100%);
    }

    .story-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      object-position: center center;
      opacity: 0;
      transform: translateY(18px) scale(1);
      filter: saturate(0.9);
      transition: opacity 0.75s ease, transform 0.75s ease, filter 0.75s ease;
      padding: 1rem;
      background: radial-gradient(circle at center, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 72%);
    }

    .story-lead-in {
      margin-top: 2rem;
      margin-bottom: 4rem;
    }

    .story-lead-card {
      position: relative;
      max-width: 780px;
      margin: 0 auto;
      padding: 1.25rem;
      border: 1px solid rgba(191, 155, 48, 0.45);
      background: linear-gradient(135deg, rgba(255, 248, 238, 0.95) 0%, rgba(239, 226, 205, 0.96) 100%);
      box-shadow: 0 22px 44px rgba(62, 44, 21, 0.14);
    }

    .story-lead-card::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(191, 155, 48, 0.35);
      pointer-events: none;
    }

    .story-lead-card img {
      display: block;
      width: 100%;
      max-height: min(72vh, 680px);
      object-fit: contain;
      object-position: center center;
    }

    .story-placeholder-text {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.64);
      text-align: center;
      padding: 1rem;
      font-weight: 500;
    }

    /* ─── DETAILS ─────────────────────────────────── */
    #details {
      background: var(--black);
      max-width: 100%;
      padding: 6rem 2rem;
    }

    .details-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    #details .section-eyebrow {
      color: var(--champagne);
    }

    #details .section-title {
      color: var(--ivory);
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 4rem;
    }

    .detail-card {
      background: #111;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      transition: background 0.4s;
    }

    .detail-card:hover {
      background: #1a1a1a;
    }

    .detail-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 40px;
      background: var(--black);
      opacity: 0.5;
    }

    .detail-icon {
      margin-bottom: 1.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }

    .detail-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
    }

    .detail-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--champagne);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .detail-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: var(--ivory);
      line-height: 1.6;
    }

    .detail-sub {
      font-size: 0.85rem;
      color: rgba(245, 240, 232, 0.78);
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    /* ─── COUNTDOWN ───────────────────────────────── */
    #countdown {
      text-align: center;
      padding: 5rem 2rem;
      background: var(--ivory);
      border-top: 1px solid rgba(201, 168, 76, 0.2);
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
    }

    .countdown-wrapper {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .count-block {
      text-align: center;
    }

    .count-number { font-variant-numeric: tabular-nums; display: inline-block; min-width: 1.5em;  font-variant-numeric: tabular-nums; display: inline-block; min-width: 1.5em; 
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 300;
      line-height: 1;
      color: var(--black);
      display: block;
      transition: transform 0.3s ease;
    }

    .count-number.flip {
      animation: flipNum 0.4s ease;
    }

    @keyframes flipNum {
      0% {
        transform: translateY(-10px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .count-label {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .count-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      color: var(--champagne);
      line-height: 1.3;
      align-self: center;
      margin-top: -0.5rem;
    }

  <script>
    // ─── GIF INTRO SCRIPTS ─────────────────────────────────
    var gifContainer = document.getElementById('intro-gif-container');
    var enterPrompt = document.getElementById('enter-prompt');
    var overlay = document.getElementById('intro-overlay');
    var music = document.getElementById('bg-music');
    var hasStarted = false;
    var readyToEnter = false;
    
    if (gifContainer) {
      gifContainer.onclick = function() {
        // First click - start music
        if (!hasStarted) {
          hasStarted = true;
          music.play().catch(function(e) { console.log('Music play failed:', e); });
          // After 10 seconds, show enter prompt
          setTimeout(function() {
            readyToEnter = true;
            if (enterPrompt) {
              enterPrompt.classList.add('visible');
            }
          }, 10000);
        // Second click - enter invitation
        } else if (readyToEnter) {
          gifContainer.classList.add('exit');

            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';

    // Force scroll to top on reload

    // Carry guest params from invitation URL into RSVP links.
    // Mark as opened=1 so direct /rsvp legacy links can be redirected to intro first.
    const guestParams = new URLSearchParams(window.location.search || '');
    if (guestParams.toString()) {
      guestParams.set('opened', '1');
      const rsvpQuery = `?${guestParams.toString()}`;
      document.querySelectorAll('a[href="rsvp.html"]').forEach((link) => {
        link.href = `rsvp.html${rsvpQuery}`;
      });
    }

    // Floating Petals
    const container = document.getElementById('petals-container');
    const colors = ['#8da38b', '#d29e9a', '#e2d5be', '#cba97c'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}dvh;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${8 + Math.random() * 14}s;
        animation-delay: ${Math.random() * 12}s;
        width: ${6 + Math.random() * 8}px;
        height: ${10 + Math.random() * 10}px;
        transform: rotate(${Math.random() * 360}deg);
      `;
      container.appendChild(p);
    }

    // ── Countdown ────────────────────────────────────
    const wedding = new Date('2026-07-04T14:00:00');
    function updateCountdown() {
      const now = new Date();
      const diff = wedding - now;
      if (diff <= 0) {
        document.querySelector('.countdown-wrapper').innerHTML =
          '<p style="font-family:\'Great Vibes\',cursive;font-size:3rem;color:var(--gold)">Today is the Day!</p>';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      const set = (id, val) => {
        const el = document.getElementById(id);
        const str = String(val).padStart(2, '0');
        if (el.textContent !== str) {
          el.classList.remove('flip');
          void el.offsetWidth;
          el.classList.add('flip');
          el.textContent = str;
        }
      };
      set('cd-days', d);
      set('cd-hours', h);
      set('cd-mins', m);
      set('cd-secs', s);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ── Scroll Reveal ─────────────────────────────────
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 }); // Lower threshold for earlier activation on mobile 
    reveals.forEach(el => observer.observe(el));

    function primeMediaCache() {
      const mediaSources = [
        'photos/main-card-photo.gif',
        'photos/cheers.gif',
        'photos/dinner.gif',
        'photos/story-photo.gif',
        'photos/new_dress_code.jpeg'
      ];
      const warm = () => {
        mediaSources.forEach((src, index) => {
          const img = new Image();
          img.decoding = 'async';
          if ('fetchPriority' in img) img.fetchPriority = index === 0 ? 'high' : 'low';
          img.src = src;
        });
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(warm, { timeout: 1200 });
      } else {
        setTimeout(warm, 250);
      }
    }

    // Staggered media loading reveal for hosted photos.
    function setupMediaLoading() {
      const mediaItems = Array.from(document.querySelectorAll(
        '.photo-placeholder img, .story-placeholder img'
      ));
      mediaItems.forEach((img, index) => {
        img.style.transitionDelay = `${Math.min(index * 110, 660)}ms`;
        const markReady = () => img.classList.add('is-loaded');
        if (img.complete && img.naturalWidth > 0) {
          requestAnimationFrame(markReady);
          return;
        }
        img.addEventListener('load', markReady, { once: true });
        img.addEventListener('error', markReady, { once: true });
      });
    }
    primeMediaCache();
    setupMediaLoading();

    // Intro card reveal + music
    const introOverlay = document.getElementById('intro-overlay');
    const introCard = document.getElementById('intro-card');
    const bgMusic = document.getElementById('bg-music');
    const musicToggle = document.getElementById('music-toggle');
    
        function updateDigit(groupEl, value) {\n        if (!groupEl) return;\n        const currentNum = groupEl.getAttribute('data-val') || '0';\n        if (currentNum === String(value)) return;\n        groupEl.setAttribute('data-val', value);\n        const nums = groupEl.querySelectorAll('.num');\n        nums.forEach(n => { n.classList.remove('flipping'); n.classList.remove('active'); });\n        const prev = parseInt(currentNum);\n        if (nums[prev]) nums[prev].classList.add('flipping');\n        if (nums[value]) nums[value].classList.add('active');\n    }\n    function updateFlipGroup(id, value, digits=2) {\n        const groupWrap = document.getElementById(id);\n        if (!groupWrap) return;\n        const valStr = String(value).padStart(digits, '0');\n        const groups = ['hundred', 'ten', 'one'];\n        const startIdx = groups.length - digits;\n        for (let i = 0; i < digits; i++) {\n            const el = groupWrap.querySelector('.nums-' + groups[startIdx + i]);\n            if (el) updateDigit(el, valStr[i]);\n        }\n    }\n\n    // Gift Modal Logic
    function openGiftModal() {
      const modal = document.getElementById('gift-modal');
      const card = modal.querySelector('.secret-card');
      modal.style.display = 'flex';
      setTimeout(() => {
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 10);
      document.body.style.overflow = 'hidden';
    }

    function closeGiftModal() {
      const modal = document.getElementById('gift-modal');
      const card = modal.querySelector('.secret-card');
      card.style.opacity = '0';
      card.style.transform = 'translateY(30px)';
      setTimeout(() => {
        modal.style.display = 'none';
      }, 500);
      document.body.style.overflow = '';
    }

    async function copySpecificInput(text, hintId) {
      const hint = document.getElementById(hintId);
      const original = hint.innerText;
      
      const success = await attemptCopy(text);
      if (success) {
        hint.innerText = '(COPIED!)';
        hint.style.color = '#27ae60';
        setTimeout(() => {
          hint.innerText = original;
          hint.style.color = '#ccc';
        }, 2000);
      }
    }

    async function attemptCopy(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (err) {
        // Fallback for older browsers or non-secure contexts
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          const successful = document.execCommand('copy');
          document.body.removeChild(textArea);
          return successful;
        } catch (err2) {
          return false;
        }
      }
    }

    window.onclick = function (event) {
      if (event.target == document.getElementById('gift-modal')) {
        closeGiftModal();
      }
    }
