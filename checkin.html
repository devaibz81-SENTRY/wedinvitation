<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-In - Andrew & Rosanna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; }
    header { text-align: center; padding: 2rem 1rem; border-bottom: 1px solid #333; }
    header h1 { font-family: 'Great Vibes', cursive; font-size: clamp(2rem, 6vw, 3.5rem); color: #fff; margin-bottom: 0.5rem; }
    header p { font-family: 'Cormorant Garamond', serif; font-style: italic; opacity: 0.8; }
    .counter { background: #fff; color: #000; padding: 0.5rem 1.5rem; border-radius: 25px; font-weight: 600; margin-top: 1rem; display: inline-block; }
    .scanner-section { padding: 1.5rem; border-bottom: 1px solid #333; }
    .scanner-section h2 { font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; margin-bottom: 1rem; text-align: center; }
    #qr-reader { width: 100%; max-width: 350px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
    .scanned-guest { background: #fff; color: #000; padding: 1.5rem; border-radius: 12px; margin-top: 1rem; max-width: 350px; margin-left: auto; margin-right: auto; text-align: center; }
    .scanned-guest h3 { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #000; margin-bottom: 0.5rem; }
    .scanned-guest p { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; margin-bottom: 1rem; }
    .checkin-btn { background: #000; color: #fff; border: 2px solid #fff; padding: 1rem 2rem; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.3s; }
    .checkin-btn:hover { background: #fff; color: #000; }
    .checkin-btn:disabled { background: #666; border-color: #666; cursor: not-allowed; }
    .checkin-btn.checked { background: #333; border-color: #333; }
    .guest-list-section { padding: 1.5rem; }
    .guest-list-section h2 { font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; margin-bottom: 1rem; text-align: center; }
    .filter-tabs { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-tab { background: transparent; border: 1px solid #fff; color: #fff; padding: 0.5rem 1rem; font-size: 0.75rem; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
    .filter-tab.active { background: #fff; color: #000; }
    .guest-list { max-height: 50vh; overflow-y: auto; }
    .guest-item { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem; background: #111; border-radius: 8px; margin-bottom: 0.5rem; border-left: 3px solid #fff; }
    .guest-item.checked-in { border-left-color: #888; background: #222; }
    .guest-item.checked-in .guest-status { color: #888; }
    .guest-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: #fff; }
    .guest-party { font-size: 0.8rem; opacity: 0.6; color: #fff; }
    .guest-status { font-size: 0.8rem; color: #fff; }
    .manual-section { padding: 1.5rem; border-top: 1px solid #333; }
    .manual-section h2 { font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; margin-bottom: 1rem; text-align: center; }
    .manual-input { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .manual-input input { flex: 1; background: #111; border: 1px solid #fff; border-radius: 8px; padding: 0.8rem 1rem; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; }
    .manual-input input::placeholder { color: #666; }
    .manual-input button { background: #fff; color: #000; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .loading { text-align: center; padding: 2rem; color: #fff; }
    .guest-qr-grid { background: #000; padding: 1rem; border-top: 1px solid #333; border-bottom: 1px solid #333; }
    .guest-qr-grid h2 { color: #fff; text-align: center; margin: 0.5rem 0 1rem; font-family: 'Great Vibes', cursive; font-size: 1.5rem; }
    .guest-qr-grid .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; justify-items: center; }
    .guest-qr-tile { background: #fff; color: #000; border-radius: 8px; padding: 10px; text-align: center; width: 100%; box-shadow: 0 4px 10px rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .guest-qr-tile:hover { transform: scale(1.02); }
    .guest-qr-tile canvas { width: 120px; height: 120px; background: #fff; border-radius: 4px; display: block; }
    .guest-qr-name { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; margin-top: 6px; color: #000; font-weight: 600; }
    .guest-qr-tile.checked-in { background: #222; opacity: 0.5; }
    .guest-qr-tile.checked-in .guest-qr-name { color: #888; text-decoration: line-through; }
  </style>
</head>
<body>
  <header>
    <h1>Andrew & Rosanna</h1>
    <p>Wedding Check-In</p>
    <div class="counter"><span id="checked-count">0</span> / <span id="total-count">0</span> Checked In</div>
  </header>

  <div class="scanner-section">
    <h2>Scan QR Code</h2>
    <div id="qr-reader"></div>
    <div id="scanned-result"></div>
  </div>

  <div class="guest-list-section">
    <h2>Guest List</h2>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="pending">Pending</button>
      <button class="filter-tab" data-filter="checked">Checked In</button>
    </div>
    <div class="guest-list" id="guest-list">
      <div class="loading">Loading guest list...</div>
    </div>
  </div>

  <div class="guest-qr-grid">
    <h2>Guest QR Codes</h2>
    <p style="text-align:center;color:#666;font-size:0.8rem;margin-bottom:1rem;">Tap to check in</p>
    <div class="qr-grid" id="qr-grid"></div>
  </div>

  <div class="manual-section">
    <h2>Manual Check-In</h2>
    <div class="manual-input">
      <input type="text" id="manual-name" placeholder="Search guest name..." />
      <button onclick="searchGuest()">Search</button>
    </div>
    <div id="manual-result"></div>
  </div>

  <script>
    const CONVEX_URL = 'https://curious-wildcat-113.convex.site';
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbw33IBpUacNLGAcqc4EGp5L2dlxaMkWSbEFvSTdFTDq6p9iO5oZCIWl6aS-BB6EIW-JUA/exec';

    let allGuests = [];
    let checkedInGuests = new Set();
    let html5QrCode = null;
    let currentFilter = 'all';

    async function fetchGuests() {
      try {
        const res = await fetch(`${CONVEX_URL}/api/guests`);
        if (!res.ok) throw new Error('Failed to fetch guests');
        const data = await res.json();
        let guests = Array.isArray(data) ? data : (data.guests || []);
        console.log('Guests loaded:', guests.length);
        console.log('Sample:', guests[0]);
        allGuests = guests;
        updateTotalCount();
        renderGuestList();
        renderGuestQRs();
      } catch (err) {
        document.getElementById('guest-list').innerHTML = '<div class="loading">Error loading guests.</div>';
        console.error('Fetch error:', err);
      }
    }

    async function fetchCheckedIn() {
      try {
        const res = await fetch(`${SHEETS_URL}?action=getCheckIns`);
        if (!res.ok) return;
        const data = await res.json();
        if (data && data.checkins && Array.isArray(data.checkins)) {
          checkedInGuests = new Set(data.checkins.map(c => String(c.guestId)));
          updateCheckedCount();
          renderGuestList();
          renderGuestQRs();
        }
      } catch (err) {
        console.log('Could not fetch check-ins:', err);
      }
    }

    function updateTotalCount() {
      document.getElementById('total-count').textContent = allGuests.length;
    }

    function updateCheckedCount() {
      document.getElementById('checked-count').textContent = checkedInGuests.size;
    }

    function renderGuestList() {
      const list = document.getElementById('guest-list');
      let filtered = allGuests;
      if (currentFilter === 'checked') {
        filtered = allGuests.filter(g => checkedInGuests.has(String(g._id || g.id)));
      } else if (currentFilter === 'pending') {
        filtered = allGuests.filter(g => !checkedInGuests.has(String(g._id || g.id)));
      }
      if (filtered.length === 0) {
        list.innerHTML = '<div class="loading">No guests found</div>';
        return;
      }
      filtered.sort((a, b) => {
        const nameA = `${a.first_name || ''} ${a.last_name || ''}`.toLowerCase();
        const nameB = `${b.first_name || ''} ${b.last_name || ''}`.toLowerCase();
        return nameA.localeCompare(nameB);
      });
      list.innerHTML = filtered.map(g => {
        const id = String(g._id || g.id);
        const fullName = `${g.first_name || ''}${g.spouse_name ? ' & ' + g.spouse_name : ''} ${g.last_name || ''}`.trim();
        const party = g.max_party || 1;
        const isChecked = checkedInGuests.has(id);
        return `<div class="guest-item ${isChecked ? 'checked-in' : ''}" onclick="quickCheckIn(${JSON.stringify(g).replace(/"/g, '&quot;')})">
          <div>
            <div class="guest-name">${fullName}</div>
            <div class="guest-party">${party} guest${party > 1 ? 's' : ''}</div>
          </div>
          <div class="guest-status">${isChecked ? '✓' : 'Tap to check in'}</div>
        </div>`;
      }).join('');
    }

    async function checkInGuest(guestId, guestName, partyCount) {
      console.log('Checking in:', guestId, guestName);
      try {
        const res = await fetch(SHEETS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'checkin',
            guestId: String(guestId),
            guestName: String(guestName),
            partyCount: Number(partyCount) || 1
          })
        });
        checkedInGuests.add(String(guestId));
        updateCheckedCount();
        renderGuestList();
        renderGuestQRs();
        return true;
      } catch (err) {
        console.error('Check-in error:', err);
        return false;
      }
    }

    function showScannedGuest(guestId, guestName) {
      const decodedName = guestName ? decodeURIComponent(guestName).trim() : '';
      console.log('QR scanned - looking for:', decodedName);
      
      const normalize = (s) => (s || '').replace(/\s+/g, ' ').trim().toLowerCase();
      const searchName = normalize(decodedName);
      
      let guest = null;
      if (searchName) {
        guest = allGuests.find(g => normalize(`${g.first_name} ${g.last_name}`) === searchName);
        if (!guest) guest = allGuests.find(g => normalize(g.first_name) === searchName);
        if (!guest) guest = allGuests.find(g => normalize(g.last_name) === searchName);
        if (!guest) guest = allGuests.find(g => searchName.includes(normalize(g.first_name)));
      }
      
      if (!guest) {
        console.log('Guest not found. Available:', allGuests.map(g => `${g.first_name} ${g.last_name}`));
        document.getElementById('scanned-result').innerHTML = `
          <div class="scanned-guest">
            <h3>Guest Not Found</h3>
            <p>QR name: "${decodedName}"</p>
            <button class="checkin-btn" onclick="document.getElementById('scanned-result').innerHTML=''">Close</button>
          </div>
        `;
        return;
      }

      console.log('Found:', guest.first_name, guest.last_name);
      const fullName = `${guest.first_name || ''}${guest.spouse_name ? ' & ' + guest.spouse_name : ''} ${guest.last_name || ''}`.trim();
      const party = guest.max_party || 1;
      const guestUniqueId = String(guest._id || guest.id);
      const isChecked = checkedInGuests.has(guestUniqueId);

      if (!isChecked) {
        checkInGuest(guestUniqueId, fullName, party);
      }
      
      document.getElementById('scanned-result').innerHTML = `
        <div class="scanned-guest">
          <h3>${fullName}</h3>
          <p>${party} guest${party > 1 ? 's' : ''}</p>
          <div style="font-weight:bold;padding:0.5rem;">${isChecked ? '✓ Already Checked In' : '✓ Checked In!'}</div>
        </div>
      `;
    }

    async function quickCheckIn(guest) {
      const id = String(guest._id || guest.id || guest.guestId || guest._key || '');
      const fullName = `${guest.first_name || ''}${guest.spouse_name ? ' & ' + guest.spouse_name : ''} ${guest.last_name || ''}`.trim();
      const party = guest.max_party || 1;
      
      const success = await checkInGuest(id, fullName, party);
      if (success) {
        document.getElementById('scanned-result').innerHTML = `
          <div class="scanned-guest">
            <h3>${fullName}</h3>
            <div style="font-weight:bold;padding:0.5rem;">✓ Checked In!</div>
            <p>${party} guest${party > 1 ? 's' : ''}</p>
          </div>
        `;
      }
    }

    function searchGuest() {
      const query = document.getElementById('manual-name').value.trim().toLowerCase();
      if (!query) return;
      const found = allGuests.find(g => {
        const name = `${g.first_name || ''} ${g.last_name || ''}`.toLowerCase();
        return name.includes(query);
      });
      const resultDiv = document.getElementById('manual-result');
      if (found) {
        quickCheckIn(found);
      } else {
        resultDiv.innerHTML = `<div class="scanned-guest"><h3>Guest Not Found</h3><p>No match for "${query}"</p></div>`;
      }
    }

    function renderGuestQRs() {
      const grid = document.getElementById('qr-grid');
      if (!grid) return;
      grid.innerHTML = '';
      if (!allGuests || allGuests.length === 0) return;
      allGuests.forEach(g => {
        const id = String(g._id || g.id || g.guestId || g._key || '');
        const fullName = `${g.first_name || ''}${g.spouse_name ? ' & ' + g.spouse_name : ''} ${g.last_name || ''}`.trim();
        const isChecked = checkedInGuests.has(id);
        
        const tile = document.createElement('div');
        tile.className = 'guest-qr-tile' + (isChecked ? ' checked-in' : '');
        tile.onclick = () => quickCheckIn(g);
        
        if (isChecked) {
          tile.innerHTML = `<div class="guest-qr-name">${fullName}</div><div style="font-size:0.8rem;font-weight:bold;">✓</div>`;
        } else {
          tile.innerHTML = `<div class="guest-qr-name">${fullName}</div><canvas id="qr-${id}" width="120" height="120"></canvas>`;
          setTimeout(() => {
            const canvas = document.getElementById('qr-' + id);
            if (canvas) {
              const ctx = canvas.getContext('2d');
              ctx.fillStyle = '#fff';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              const checkinUrl = `https://wedinvitation-ruddy.vercel.app/checkin.html?id=${encodeURIComponent(id)}&name=${encodeURIComponent(fullName)}`;
              try {
                const qr = qrcode(0, 'M');
                qr.addData(checkinUrl);
                qr.make();
                const moduleCount = qr.getModuleCount();
                const cell = canvas.width / moduleCount;
                ctx.fillStyle = '#000';
                for (let r = 0; r < moduleCount; r++) {
                  for (let c = 0; c < moduleCount; c++) {
                    if (qr.isDark(r, c)) ctx.fillRect(c * cell, r * cell, cell, cell);
                  }
                }
              } catch (e) {}
            }
          }, 100);
        }
        grid.appendChild(tile);
      });
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderGuestList();
      });
    });

    async function initScanner() {
      try {
        html5QrCode = new Html5Qrcode("qr-reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1 };
        await html5QrCode.start({ facingMode: "environment" }, config,
          (decodedText) => {
            console.log('QR Scanned:', decodedText);
            try {
              const url = new URL(decodedText);
              showScannedGuest(url.searchParams.get('id') || '', url.searchParams.get('name') || '');
            } catch {
              showScannedGuest('', decodedText);
            }
          },
          () => {}
        );
      } catch (err) {
        document.getElementById('qr-reader').innerHTML = `<div style="text-align:center;padding:2rem;color:#fff;"><p>Camera access needed</p></div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchGuests();
      fetchCheckedIn();
      initScanner();
      const params = new URLSearchParams(window.location.search);
      if (params.get('id') || params.get('name')) {
        setTimeout(() => showScannedGuest(params.get('id') || '', params.get('name') || ''), 1500);
      }
      setInterval(fetchCheckedIn, 30000);
    });
  </script>
</body>
</html>
